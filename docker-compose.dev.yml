version: '3.8'

# Development Docker Compose - simplified setup for local development
# Use: docker-compose -f docker-compose.dev.yml up

services:
  # MongoDB Database (no authentication for dev)
  mongo:
    image: mongo:7.0
    container_name: chatapp-mongo-dev
    restart: unless-stopped
    ports:
      - '27017:27017'
    volumes:
      - mongo-data-dev:/data/db
    networks:
      - chatapp-network
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/test --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: chatapp-backend-dev
    restart: unless-stopped
    ports:
      - '8000:8000'
    environment:
      NODE_ENV: development
      PORT: 8000
      MONGO_URI: mongodb://mongo:27017/chatapp
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-change-in-production}
      CLOUDINARY_CLOUD_NAME: ${CLOUDINARY_CLOUD_NAME}
      CLOUDINARY_API_KEY: ${CLOUDINARY_API_KEY}
      CLOUDINARY_API_SECRET: ${CLOUDINARY_API_SECRET}
    depends_on:
      mongo:
        condition: service_healthy
    networks:
      - chatapp-network
    volumes:
      - ./backend/src:/app/src
    command: npm run dev

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: chatapp-frontend-dev
    restart: unless-stopped
    ports:
      - '5173:80'
    depends_on:
      - backend
    networks:
      - chatapp-network

volumes:
  mongo-data-dev:
    driver: local

networks:
  chatapp-network:
    driver: bridge
